<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SerialPad · 串口坐标控制面板</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-microchip"></i> SerialPad</h1>
            <p class="subtitle">通过 Web Serial API 连接本地 COM 端口，键盘/鼠标发送控制命令</p>
        </header>

        <div class="app-content">
            <!-- 串口控制区域 -->
            <div class="serial-section">
                <h2><i class="fas fa-plug"></i> 串口连接</h2>
                <div class="serial-controls">
                    <div class="serial-info">
                        <div class="status-indicator">
                            <span class="status-dot" id="statusDot"></span>
                            <span id="statusText">未连接</span>
                        </div>
                        <div class="port-info" id="portInfo">
                            未选择端口
                        </div>
                    </div>
                    
                    <div class="serial-buttons">
                        <button id="connectBtn" class="btn btn-primary">
                            <i class="fas fa-search"></i> 搜索并连接 COM 端口
                        </button>
                        <button id="disconnectBtn" class="btn btn-secondary" disabled>
                            <i class="fas fa-unlink"></i> 断开连接
                        </button>
                    </div>
                </div>
                
                <div class="baudrate-selector">
                    <label for="baudrate">波特率:</label>
                    <select id="baudrate">
                        <option value="9600">9600</option>
                        <option value="19200">19200</option>
                        <option value="38400">38400</option>
                        <option value="57600">57600</option>
                        <option value="115200" selected>115200</option>
                    </select>
                </div>
            </div>

            <!-- 控制面板区域（三栏布局） -->
            <div class="control-section">
                <h2><i class="fas fa-gamepad"></i> 方向控制</h2>
                <div class="control-instruction">
                    <p>使用键盘 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 或方向键控制，或使用鼠标控制区域</p>
                </div>
                
                <div class="control-panel">
                    <!-- 左侧：键盘方向键控制 -->
                    <div class="keyboard-control-section">
                        <div class="keyboard-title">
                            <i class="fas fa-keyboard"></i> 键盘方向控制
                        </div>
                        <div class="keyboard-layout">
                            <!-- 上方向按钮 -->
                            <div class="keyboard-row">
                                <button id="upBtn" class="direction-btn up-btn">
                                    <i class="fas fa-arrow-up"></i>
                                    <span class="btn-label">上 (W/↑)</span>
                                </button>
                            </div>
                            
                            <!-- 中行：左右按钮 -->
                            <div class="keyboard-row">
                                <button id="leftBtn" class="direction-btn left-btn">
                                    <i class="fas fa-arrow-left"></i>
                                    <span class="btn-label">左 (A/←)</span>
                                </button>
                                
                                <div style="width: var(--keyboard-btn-size); height: var(--keyboard-btn-size);"></div>
                                
                                <button id="rightBtn" class="direction-btn right-btn">
                                    <i class="fas fa-arrow-right"></i>
                                    <span class="btn-label">右 (D/→)</span>
                                </button>
                            </div>
                            
                            <!-- 下方向按钮 -->
                            <div class="keyboard-row">
                                <button id="downBtn" class="direction-btn down-btn">
                                    <i class="fas fa-arrow-down"></i>
                                    <span class="btn-label">下 (S/↓)</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 中间：鼠标控制区域 (256x256) -->
                    <div class="mouse-control-section">
                        <div class="mouse-control-title">
                            <i class="fas fa-mouse-pointer"></i> 鼠标坐标控制 (范围 -128~127)
                        </div>
                        <div class="mouse-control-container">
                            <div class="mouse-control-box" id="mouseControlBox">
                                <div class="mouse-center-indicator" id="mouseCenter"></div>
                                <div class="mouse-coordinates">
                                    <span>X: <span id="mouseX">0</span></span>
                                    <span>Y: <span id="mouseY">0</span></span>
                                </div>
                            </div>
                        </div>
                        <!-- <div class="mouse-instruction">
                            <p>左键按下移动：发送坐标 (x,y)</p>
                            <p>左键点击：发送当前位置坐标</p>
                            <p>右键点击：重置到中心，发送 (0,0)</p>
                        </div> -->
                    </div>
                    
                    <!-- 右侧：命令信息显示 -->
                    <div class="command-info-section">
                        <div class="command-info-title">
                            <i class="fas fa-terminal"></i> 命令信息
                        </div>
                        <div class="command-info-display">
                            <div class="command-display-item">
                                <div class="display-title">最后发送的命令</div>
                                <div class="command-display" id="lastCommand">无</div>
                            </div>
                            <div class="command-display-item">
                                <div class="display-title">发送统计</div>
                                <div class="counter" id="commandCount">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 自定义命令区域 -->
                <div class="custom-command">
                    <h3>自定义命令</h3>
                    <div class="custom-control">
                        <input type="text" id="customCommand" placeholder="输入要发送的命令...">
                        <button id="sendCustomBtn" class="btn btn-secondary">发送</button>
                    </div>
                    <div class="quick-commands">
                        <button class="quick-btn" data-command="START">启动</button>
                        <button class="quick-btn" data-command="STOP">停止</button>
                        <button class="quick-btn" data-command="RESET">复位</button>
                    </div>
                </div>
            </div>

            <!-- 日志区域 -->
            <div class="log-section">
                <h2><i class="fas fa-list-alt"></i> 通信日志</h2>
                <div class="log-controls">
                    <button id="clearLogBtn" class="btn btn-secondary">
                        <i class="fas fa-trash"></i> 清空日志
                    </button>
                    <button id="pauseLogBtn" class="btn btn-secondary">
                        <i class="fas fa-pause"></i> 暂停更新
                    </button>
                </div>
                <div class="log-container">
                    <div class="log-header">
                        <span class="log-timestamp">时间</span>
                        <span class="log-direction">方向</span>
                        <span class="log-data">数据</span>
                    </div>
                    <div class="log-entries" id="logEntries">
                        <div class="log-entry info">
                            <span class="log-timestamp">--:--:--</span>
                            <span class="log-direction">INFO</span>
                            <span class="log-data">等待连接串口...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div class="browser-support">
                <p><i class="fas fa-info-circle"></i> 需要支持 Web Serial API 的浏览器 (Chrome/Edge 89+)</p>
                <p><i class="fas fa-info-circle"></i> 运行环境: HTTPS 或 localhost</p>
            </div>
            <!-- <div class="shortcuts">
                <h4>快捷键:</h4>
                <p><kbd>W</kbd>/<kbd>↑</kbd> = U · <kbd>S</kbd>/<kbd>↓</kbd> = D · <kbd>A</kbd>/<kbd>←</kbd> = L · <kbd>D</kbd>/<kbd>→</kbd> = R</p>
                <p>鼠标坐标格式 <code>(x,y)</code> 范围 -128~127</p>
            </div> -->
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
